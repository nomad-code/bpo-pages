<!-- Found password wall · self-locating loader.
     Paste this in <head>. Works at ANY folder depth (artifacts/ or artifacts/zyx/…),
     on file:// and on GitHub Pages, with no path edits when you drag the file around.
     It walks parent directories until it finds password-wall/gate.js, so archiving an
     artifact into zyx/ never breaks the gate. Pre-hides the page to avoid a flash. -->
<script>
(function () {
  var KEY = 'bpo-unlocked';
  var unlocked = false;
  try {
    unlocked = localStorage.getItem(KEY) === 'true' || sessionStorage.getItem(KEY) === 'true';
  } catch (e) {}

  var hide;
  if (!unlocked) {
    hide = document.createElement('style');
    hide.id = '__pw_gate_hide__';
    hide.textContent = 'html > body > *:not(#__pw_gate__){display:none!important}';
    (document.head || document.documentElement).appendChild(hide);
  }

  // gate.js reads this when loaded dynamically (document.currentScript is null then).
  window.__BPO_GATE__ = { label: 'bpo · Private', key: KEY };

  // Try same dir, then walk up. First hit wins; on Pages /bob/<slug>/ resolves at '../'.
  var prefixes = ['', '../', '../../', '../../../', '../../../../'];
  var i = 0;
  (function next() {
    if (i >= prefixes.length) {            // password-wall not found anywhere:
      if (hide) hide.remove();             // fail-open so a local/offline read isn't blank.
      return;
    }
    var s = document.createElement('script');
    s.src = prefixes[i++] + 'password-wall/gate.js';
    s.onerror = next;
    document.head.appendChild(s);
  })();
})();
</script>
